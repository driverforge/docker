name: Build & publish

on:
  push:
    branches:
      - main
    paths:
      - 'images/**'
  workflow_dispatch:
    inputs:
      image:
        description: 'Image name (under images/) to build. Leave blank to build all images.'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  detect-changed-images:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.detect.outputs.images }}
      has-changes: ${{ steps.detect.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve images to build
        id: detect
        env:
          DISPATCH_IMAGE: ${{ github.event.inputs.image }}
        run: |
          set -euo pipefail

          # Manual dispatch: honour the input. Blank input = every image.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "$DISPATCH_IMAGE" ]; then
              echo "Manual dispatch for single image: $DISPATCH_IMAGE"
              echo "has-changes=true" >> "$GITHUB_OUTPUT"
              echo "images=$(jq -nc --arg i "$DISPATCH_IMAGE" '[$i]')" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Manual dispatch without image input: building every image."
            all=$(ls -d images/*/ | awk -F/ '{print $2}' | jq -R . | jq -sc .)
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
            echo "images=$all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Push to main: only images whose dir changed in the merge commit.
          changed=$(git diff --name-only HEAD^ HEAD -- 'images/' \
            | awk -F/ 'NF>=2 {print $2}' \
            | sort -u)

          if [ -z "$changed" ]; then
            echo "No image directories changed in this push."
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            echo "images=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed images:"
          echo "$changed" | sed 's/^/  - /'

          json=$(echo "$changed" | jq -R . | jq -sc .)
          echo "has-changes=true" >> "$GITHUB_OUTPUT"
          echo "images=$json" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.image }}
    needs: detect-changed-images
    if: needs.detect-changed-images.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.detect-changed-images.outputs.images) }}
    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: |
          set -euo pipefail
          v=$(tr -d '[:space:]' < "images/${{ matrix.image }}/VERSION")
          echo "v=$v" >> "$GITHUB_OUTPUT"
          echo "Building ${{ matrix.image }}:$v"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure tag does not already exist
        env:
          TAG: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.version.outputs.v }}
        run: |
          set -euo pipefail
          if docker manifest inspect "$TAG" > /dev/null 2>&1; then
            echo "::error::$TAG already exists. Tags are immutable — bump VERSION before re-publishing."
            exit 1
          fi
          echo "Tag $TAG is available."

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.version.outputs.v }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.v }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: true
          sbom: true
