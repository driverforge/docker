name: PR checks

# Runs on every PR (not just image changes) so that the aggregating
# `ci` job below can be required in branch protection without
# blocking docs-only or workflow-only PRs. When no image dirs
# changed, detect-changed-images outputs an empty matrix, validate
# is skipped, and the ci gate still passes.
on:
  pull_request:

permissions:
  contents: read

jobs:
  detect-changed-images:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.detect.outputs.images }}
      has-changes: ${{ steps.detect.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List images with changes vs base
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Unique top-level dirs under images/ that have any change in this PR.
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 'images/' \
            | awk -F/ 'NF>=2 {print $2}' \
            | sort -u)

          if [ -z "$changed" ]; then
            echo "No image directories changed."
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            echo "images=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed images:"
          echo "$changed" | sed 's/^/  - /'

          json=$(echo "$changed" | jq -R . | jq -sc .)
          echo "has-changes=true" >> "$GITHUB_OUTPUT"
          echo "images=$json" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate ${{ matrix.image }}
    needs: detect-changed-images
    if: needs.detect-changed-images.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.detect-changed-images.outputs.images) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require VERSION bump if other files changed and base is published
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          IMAGE: ${{ matrix.image }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          # Did the VERSION file change in this PR?
          version_changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            -- "images/$IMAGE/VERSION" | wc -l)

          # Did anything OTHER than VERSION + CHANGELOG change?
          other_changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            -- "images/$IMAGE/" \
            | grep -vE "^images/$IMAGE/(VERSION|CHANGELOG\.md)$" \
            | wc -l)

          if [ "$other_changed" -eq 0 ]; then
            echo "No image-content changes — bump check skipped."
            exit 0
          fi

          if [ "$version_changed" -gt 0 ]; then
            echo "VERSION changed alongside content — bump check passed."
            exit 0
          fi

          # Content changed but VERSION didn't. Only legal if base's
          # VERSION was never published to ghcr.io (previous publish
          # failed, burning the version) — in that case the PR can
          # reuse it. If base is published, require a bump so we don't
          # try to overwrite an immutable tag.
          base_version=$(git show "$BASE_SHA:images/$IMAGE/VERSION" | tr -d '[:space:]')
          base_tag="ghcr.io/$OWNER/$IMAGE:$base_version"
          if docker manifest inspect "$base_tag" > /dev/null 2>&1; then
            echo "::error::images/$IMAGE/ has content changes but VERSION was not bumped, and $base_tag is already published."
            echo "Bump images/$IMAGE/VERSION to a new SemVer and update CHANGELOG.md."
            exit 1
          fi

          echo "Base VERSION $base_version is unpublished (burnt in a prior failed publish). Reuse allowed."

      - name: Validate VERSION is SemVer and not backwards vs a published base
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          IMAGE: ${{ matrix.image }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          if [ ! -f "images/$IMAGE/VERSION" ]; then
            echo "::error::images/$IMAGE/VERSION is missing."
            exit 1
          fi

          new_version=$(tr -d '[:space:]' < "images/$IMAGE/VERSION")
          if ! echo "$new_version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::images/$IMAGE/VERSION ('$new_version') is not SemVer (X.Y.Z)."
            exit 1
          fi

          # If base's VERSION is published to ghcr.io, enforce monotonic
          # bump against it. If it's unpublished (burnt), allow any
          # SemVer — the "tag not in ghcr.io" check below is the real gate.
          note="no base VERSION"
          if old_version=$(git show "$BASE_SHA:images/$IMAGE/VERSION" 2>/dev/null | tr -d '[:space:]'); then
            base_tag="ghcr.io/$OWNER/$IMAGE:$old_version"
            if docker manifest inspect "$base_tag" > /dev/null 2>&1; then
              if [ "$old_version" != "$new_version" ]; then
                highest=$(printf '%s\n%s\n' "$old_version" "$new_version" | sort -V | tail -1)
                if [ "$highest" != "$new_version" ]; then
                  echo "::error::VERSION went backwards: $old_version -> $new_version (base is published)."
                  exit 1
                fi
              fi
              note="base: $old_version, published"
            else
              note="base: $old_version, unpublished — no monotonic check"
            fi
          fi

          echo "VERSION is valid SemVer: $new_version ($note)"
          echo "VERSION=$new_version" >> "$GITHUB_ENV"

      - name: Ensure tag does not already exist in ghcr.io
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail

          tag="ghcr.io/${{ github.repository_owner }}/$IMAGE:$VERSION"

          # Anonymous pull works for public ghcr.io images. If the manifest
          # inspect succeeds, the tag exists — means someone tried to reuse
          # an already-published version number.
          if docker manifest inspect "$tag" > /dev/null 2>&1; then
            echo "::error::$tag already exists in ghcr.io. Bump images/$IMAGE/VERSION."
            exit 1
          fi

          echo "Tag $tag is available."

  # Single aggregating job with a stable name so branch protection
  # can require one check regardless of how many images are in the
  # matrix. Passes when every upstream job either succeeded or was
  # skipped (e.g. no image changes); fails if any upstream failed
  # or was cancelled.
  ci:
    name: CI
    needs: [detect-changed-images, validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate on upstream results
        env:
          DETECT_RESULT: ${{ needs.detect-changed-images.result }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
        run: |
          set -euo pipefail

          echo "detect-changed-images: $DETECT_RESULT"
          echo "validate: $VALIDATE_RESULT"

          if [ "$DETECT_RESULT" != "success" ]; then
            echo "::error::detect-changed-images did not succeed."
            exit 1
          fi

          # validate is 'skipped' when no image dirs changed — that's
          # a pass. Only fail on explicit failure/cancellation.
          case "$VALIDATE_RESULT" in
            success|skipped) ;;
            *)
              echo "::error::validate did not succeed ($VALIDATE_RESULT)."
              exit 1
              ;;
          esac

          echo "All required checks passed."
